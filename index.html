<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obakeng’s Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F9F7F2; margin: 0; padding: 0; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .product-card { background: white; padding: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        img { width: 100%; height: auto; border-radius: 4px; display: block; background-color: #f3f3f3; }
        .hidden { display: none !important; }
        
        /* The Popup Overlay Backdrop */
        #authOverlay { 
            position: fixed; 
            inset: 0; 
            background-color: rgba(0,0,0,0.4); 
            backdrop-filter: blur(4px);
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* The "Inner Circle" Card Style */
        .auth-card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            position: relative;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .auth-card input { 
            border: none;
            border-bottom: 1px solid #e5e7eb; 
            padding: 12px 0; 
            font-size: 14px; 
            width: 100%; 
            margin-bottom: 15px; 
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }
        .auth-card input:focus { border-bottom-color: black; }

        /* Shopping Cart Sidebar Style */
        #cartDrawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 320px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 200;
            transition: 0.4s right ease;
            display: flex;
            flex-direction: column;
        }
        #cartDrawer.open { right: 0; }
    </style>

    <script>
        let supabaseClient;
        let cart = []; // Array to store chosen items
        
        window.onload = () => {
            const url = 'https://tzafocdulhlbviylvoiw.supabase.co';
            const key = 'sb_publishable_jId-QHw2IQuFyUAdnOOO8g_jqldIKnY';
            supabaseClient = window.supabase.createClient(url, key);

            if (window.location.hash.includes('type=recovery')) {
                const newPassword = prompt("Please enter your new password:");
                if (newPassword) {
                    supabaseClient.auth.updateUser({ password: newPassword }).then(({ error }) => {
                        if (error) alert(error.message);
                        else alert("Password updated! Please login.");
                    });
                }
            }
        };

        // --- CART LOGIC ---
        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
            toggleCart(true); // Open drawer when item added
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart(show) {
            const drawer = document.getElementById('cartDrawer');
            if (show) drawer.classList.add('open');
            else drawer.classList.remove('open');
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const count = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-stone-100">
                        <div>
                            <p class="text-[10px] font-bold uppercase tracking-widest">${item.name}</p>
                            <p class="text-[10px] text-stone-400">R ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-400 text-xs">REMOVE</button>
                    </div>
                `;
            });

            count.innerText = cart.length;
            totalEl.innerText = total;
        }

        function sendWhatsAppOrder() {
            if (cart.length === 0) return;
            
            let message = "Hello Obakeng's Boutique! I'd like to order:\n\n";
            cart.forEach(item => {
                message += `- ${item.name} (R ${item.price})\n`;
            });
            message += `\nTotal: R ${document.getElementById('cartTotal').innerText}`;
            
            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/27636348628?text=${encodedMsg}`, '_blank');
        }

        // --- AUTH LOGIC ---
        function toggleAuthMode(isSignUp) {
            const title = document.getElementById('authTitle');
            const actionBtn = document.getElementById('actionBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const forgotBtn = document.getElementById('forgotBtn');
            const errorArea = document.getElementById('authError');
            errorArea.classList.add('hidden');

            if (isSignUp) {
                title.innerText = "Create Account";
                actionBtn.innerText = "CREATE ACCOUNT";
                actionBtn.onclick = () => handleAuth('signup');
                toggleBtn.innerText = "ALREADY A MEMBER? LOGIN";
                toggleBtn.onclick = () => toggleAuthMode(false);
                forgotBtn.classList.add('hidden');
            } else {
                title.innerText = "Join the Inner Circle";
                actionBtn.innerText = "LOGIN";
                actionBtn.onclick = () => handleAuth('login');
                toggleBtn.innerText = "CREATE ACCOUNT";
                toggleBtn.onclick = () => toggleAuthMode(true);
                forgotBtn.classList.remove('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;
            const errorArea = document.getElementById('authError');
            const btn = document.getElementById('actionBtn');

            if (!email || !password) {
                errorArea.innerText = "PLEASE FILL ALL FIELDS";
                errorArea.classList.remove('hidden');
                return;
            }

            errorArea.classList.add('hidden');
            btn.innerText = "PROCESSING...";

            try {
                if (type === 'signup') {
                    const { error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    errorArea.innerText = "CHECK EMAIL TO VERIFY";
                    errorArea.classList.remove('hidden');
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    document.getElementById('authOverlay').classList.add('hidden');
                    document.getElementById('memberSection').classList.remove('hidden');
                    document.getElementById('displayEmail').innerText = email.toUpperCase();
                }
            } catch (err) {
                errorArea.innerText = err.message.toUpperCase();
                errorArea.classList.remove('hidden');
            } finally {
                btn.innerText = (type === 'signup') ? "CREATE ACCOUNT" : "LOGIN";
            }
        }

        async function forgotPassword() {
            const email = document.getElementById('emailInput').value;
            const errorArea = document.getElementById('authError');
            if (!email) {
                errorArea.innerText = "ENTER EMAIL ABOVE FIRST";
                errorArea.classList.remove('hidden');
                return;
            }
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + window.location.pathname,
            });
            errorArea.innerText = error ? error.message.toUpperCase() : "RESET LINK SENT!";
            errorArea.classList.remove('hidden');
        }
    </script>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <button onclick="document.getElementById('authOverlay').classList.add('hidden')" class="absolute top-4 right-4 text-stone-300 text-2xl">&times;</button>
            <h2 id="authTitle" class="text-2xl italic mb-10">Join the Inner Circle</h2>
            <input type="email" id="emailInput" placeholder="Email Address">
            <input type="password" id="passInput" placeholder="Password">
            <button id="actionBtn" onclick="handleAuth('login')" class="bg-[#1a1a1a] text-white w-full py-4 text-[11px] uppercase font-bold tracking-[0.2em] mt-6">Login</button>
            <button id="toggleBtn" onclick="toggleAuthMode(true)" class="text-[10px] text-stone-400 uppercase tracking-widest mt-6 block w-full">Create Account</button>
            <button id="forgotBtn" onclick="forgotPassword()" class="text-[9px] text-stone-400 uppercase tracking-widest mt-4 block w-full">Forgot Password?</button>
            <p id="authError" class="text-[10px] text-red-600 uppercase tracking-widest mt-6 hidden"></p>
        </div>
    </div>

    <div id="cartDrawer" class="p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl italic">Your Selection</h2>
            <button onclick="toggleCart(false)" class="text-2xl text-stone-300">&times;</button>
        </div>
        <div id="cartList" class="flex-grow overflow-y-auto">
            </div>
        <div class="pt-6 border-t border-stone-200 mt-auto">
            <div class="flex justify-between text-[11px] font-bold tracking-widest mb-4">
                <span>TOTAL:</span>
                <span>R <span id="cartTotal">0</span></span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="bg-black text-white w-full py-4 text-[11px] uppercase font-bold tracking-[0.2em]">Checkout via WhatsApp</button>
        </div>
    </div>

    <nav class="flex items-center justify-between px-6 py-6 bg-white border-b sticky top-0 z-50">
        <div class="text-lg font-bold uppercase italic tracking-tighter">OBAKENG’S</div>
        <div class="flex items-center gap-6">
            <div id="memberSection" class="hidden flex items-center gap-4">
                <span id="displayEmail" class="text-[8px] tracking-widest text-stone-400"></span>
                <button onclick="location.reload()" class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Logout</button>
            </div>
            
            <button onclick="document.getElementById('authOverlay').classList.remove('hidden')" class="text-stone-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
            </button>

            <button onclick="toggleCart(true)" class="relative text-stone-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                </svg>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-black text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <section class="py-8 px-4 max-w-md mx-auto">
        <h2 class="text-xl italic text-center mb-8 tracking-widest">Collections</h2>

        <div class="product-card text-center">
            <img src="sunshine.jpg" alt="Sunshine Bows">
            <h3 class="text-sm tracking-widest uppercase font-bold mt-4">Sunshine Bows</h3>
            <p class="text-stone-400 text-xs mt-1">R 300.00</p>
            <button onclick="addToCart('Sunshine Bows', 300)" class="mt-6 w-full border border-black py-4 text-[10px] font-bold uppercase tracking-widest">Add to Bag</button>
        </div>

        <div class="product-card text-center">
            <img src="beaded.jpg" alt="Beaded Drops">
            <h3 class="text-sm tracking-widest uppercase font-bold mt-4">Beaded Drops</h3>
            <p class="text-stone-400 text-xs mt-1">R 250.00</p>
            <button onclick="addToCart('Beaded Drops', 250)" class="mt-6 w-full border border-black py-4 text-[10px] font-bold uppercase tracking-widest">Add to Bag</button>
        </div>

        <div class="product-card text-center">
            <img src="denim.jpg" alt="Denim Delights">
            <h3 class="text-sm tracking-widest uppercase font-bold mt-4">Denim Delights</h3>
            <p class="text-stone-400 text-xs mt-1">R 200.00</p>
            <button onclick="addToCart('Denim Delights', 200)" class="mt-6 w-full border border-black py-4 text-[10px] font-bold uppercase tracking-widest">Add to Bag</button>
        </div>

        <div class="product-card text-center">
            <img src="tassel.jpg" alt="Tassel Delight">
            <h3 class="text-sm tracking-widest uppercase font-bold mt-4">Tassel Delight</h3>
            <p class="text-stone-400 text-xs mt-1">R 350.00</p>
            <button onclick="addToCart('Tassel Delight', 350)" class="mt-6 w-full border border-black py-4 text-[10px] font-bold uppercase tracking-widest">Add to Bag</button>
       </div>
        <div class="bg-white p-4 shadow-md rounded-lg">
    <div class="relative overflow-hidden group">
        <img src="denim2.jpg" alt="Denim Delights 2" class="w-full h-80 object-cover rounded-md mb-4 transition-transform duration-500 group-hover:scale-105">
    </div>
    <h3 class="text-xl font-semibold text-center uppercase tracking-widest">Denim Delights Vol. 2</h3>
    <p class="text-gray-500 text-center mt-1">R 200.00</p>
    <button class="w-full mt-4 py-3 border border-black hover:bg-black hover:text-white transition-colors duration-300 uppercase text-sm tracking-widest">
        Add to Bag
    </button>
</div>

    </section>

</body>
</html>
